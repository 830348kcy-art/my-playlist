<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>버킷리스트</title>
  <style>
    body {
      min-height: 100vh;
      background: #e8e0d5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Gaegu', cursive;
    }

    .card {
      width: 300px;
      background: #fffacd;
      padding: 16px;
      border-radius: 2px;
      box-shadow: 4px 4px 0 #d4c45a, 6px 8px 20px rgba(0,0,0,0.18);
      position: relative;
      transition: transform 0.2s;
    }
    .card:hover { transform: rotate(-1deg) translateY(-4px); }

    .badge {
      position: absolute;
      top: 10px; right: -8px;
      background: #ff5a5a;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
      transform: rotate(5deg);
    }

    .card img { width: 100%; height: 170px; object-fit: cover; border-radius: 2px; margin-bottom: 12px; }
    .card h2  { font-size: 1.6rem; color: #3a2e1a; border-bottom: 2px dashed #d4c45a; padding-bottom: 8px; margin-bottom: 10px; }
    .item     { font-size: 1.1rem; color: #3a2e1a; padding: 6px 0; border-bottom: 1px dashed rgba(180,150,60,0.3); }

    .secret {
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(255,240,150,0.6);
      border-left: 3px solid #d4b800;
      font-size: 0.95rem;
      color: #5a4500;
      font-style: italic;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover .secret {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🔥 Hot</div>

    <img src="./images/jlpt.png" alt="JLPT" width="250">
    <h2>✨ 나의 버킷리스트</h2>
    <div class="item">🚗 운전면허 따기</div>
    <div class="item">⛩️ JLPT N2 따기</div>
    <div class="item">🌍 해외 어디든 한 달 살기</div>

    <div class="secret">🤫 운전면허 한번에 붙었으면 좋겠다... N3 공부 중인데 N2로 넘어가고 싶다!! 📚</div>
  </div>
</body>
</html>
